  name: Run Test API Using RestAssured
  on:
    push:
      branches: [ "main" , "master"]



  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v3
        - uses: actions/setup-java@v3
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: maven
        - run:  mvn clean test